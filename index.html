<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security: GitHub Pages cannot set HTTP headers, so CSP lives here.
         Allowed hosts: GitHub API + contributions API (stats), skillicons (skill logos),
         Google Fonts, EmailJS (contact form). -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://skillicons.dev https://avatars.githubusercontent.com; connect-src 'self' https://api.github.com https://github-contributions-api.jogruber.de https://api.emailjs.com; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#080810" />

    <!-- SEO Meta Tags -->
    <title>Soro Falibeta | Data Scientist & Full Stack Developer</title>
    <meta
      name="description"
      content="Data Scientist Junior specializing in data analysis, machine learning, and full-stack development. Expert in Python, Flutter, React, and modern web technologies."
    />
    <meta
      name="keywords"
      content="Data Scientist, Full Stack Developer, Python, Flutter, React, Machine Learning, Data Analysis, Web Development"
    />
    <meta name="author" content="Soro Falibeta" />

    <!-- Open Graph Meta Tags -->
    <meta
      property="og:title"
      content="Soro Falibeta | Data Scientist & Full Stack Developer"
    />
    <meta
      property="og:description"
      content="Data Scientist Junior specializing in data analysis, machine learning, and full-stack development."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/assets/photo identite.jpg" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Soro Falibeta | Data Scientist & Full Stack Developer"
    />
    <meta
      name="twitter:description"
      content="Data Scientist Junior specializing in data analysis, machine learning, and full-stack development."
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
